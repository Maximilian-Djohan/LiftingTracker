<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1115" />
  <title>Lifting Tracker</title>
  <link rel="stylesheet" href="css/styles.css?v=16" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Lifting Tracker</h1>
    <button id="settingsBtn" class="settings-btn" title="Settings" aria-label="Settings">⚙️</button>
  </header>

  <main id="view" class="view"><!-- views render here --></main>

  <nav class="tabbar">
    <button class="tab-btn is-active" data-tab="workout">
      <span class="tab-icon">📋</span><span class="tab-label">Workout</span>
    </button>
    <button class="tab-btn" data-tab="library">
      <span class="tab-icon">📚</span><span class="tab-label">Library</span>
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="tab-icon">📈</span><span class="tab-label">History</span>
    </button>
  </nav>

  <!-- Exercise picker modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <h2>Add Exercise</h2>
        <button class="icon-btn" data-close>✕</button>
      </div>
      <input id="pickerSearch" class="search" type="search" placeholder="Search exercises…" autocomplete="off" />
      <div id="pickerChips" class="chips"></div>
      <div id="pickerList" class="picker-list"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-backdrop" data-close-settings></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <h2>Settings</h2>
        <button class="icon-btn" data-close-settings>✕</button>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Weight unit</div>
          <div class="setting-desc">Used across logging and history</div>
        </div>
        <div class="seg" id="unitSeg">
          <button class="seg-btn" data-unit="kg">kg</button>
          <button class="seg-btn" data-unit="lb">lb</button>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Appearance</div>
          <div class="setting-desc">Light or dark theme</div>
        </div>
        <div class="seg" id="themeSeg">
          <button class="seg-btn" data-theme="dark">🌙 Dark</button>
          <button class="seg-btn" data-theme="light">☀️ Light</button>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Anatomy figure</div>
          <div class="setting-desc">Show the body map in the library</div>
        </div>
        <div class="seg" id="figureSeg">
          <button class="seg-btn" data-figure="on">On</button>
          <button class="seg-btn" data-figure="off">Off</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/exercises.js?v=16"></script>
  <script src="js/bodyfig.js?v=16"></script>
  <script src="js/storage.js?v=16"></script>
  <script src="js/app.js?v=16"></script>
</body>
</html>
