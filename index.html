<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1115" />
  <title>Lifting Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">🏋️ Lifting Tracker</h1>
    <div class="header-actions">
      <button id="imgToggle" class="unit-toggle" title="Show/hide exercise pictures">🖼 On</button>
      <button id="unitToggle" class="unit-toggle" title="Toggle weight unit">kg</button>
    </div>
  </header>

  <main id="view" class="view"><!-- views render here --></main>

  <nav class="tabbar">
    <button class="tab-btn is-active" data-tab="workout">
      <span class="tab-icon">📋</span><span class="tab-label">Workout</span>
    </button>
    <button class="tab-btn" data-tab="library">
      <span class="tab-icon">📚</span><span class="tab-label">Library</span>
    </button>
    <button class="tab-btn" data-tab="history">
      <span class="tab-icon">📈</span><span class="tab-label">History</span>
    </button>
  </nav>

  <!-- Exercise picker modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <h2>Add Exercise</h2>
        <button class="icon-btn" data-close>✕</button>
      </div>
      <input id="pickerSearch" class="search" type="search" placeholder="Search exercises…" autocomplete="off" />
      <div id="pickerChips" class="chips"></div>
      <div id="pickerList" class="picker-list"></div>
    </div>
  </div>

  <script src="js/exercises.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
